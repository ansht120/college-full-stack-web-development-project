services:
  postgres:
    image: postgres:16-alpine
    container_name: college-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-college_management}
      POSTGRES_USER: ${POSTGRES_USER:-college_app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-college_app_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-college_app} -d ${POSTGRES_DB:-college_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-java:
    build:
      context: ./backend-java
    container_name: college-backend-java
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-college_management}
      DB_USERNAME: ${POSTGRES_USER:-college_app}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-college_app_password}
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-to-at-least-64-characters-before-production-use}
    ports:
      - "${BACKEND_PORT:-8080}:8080"

volumes:
  postgres_data:
