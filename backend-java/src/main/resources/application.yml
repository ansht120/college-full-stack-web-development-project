server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /api/v1

spring:
  application:
    name: college-management-api
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/college_management}
    username: ${DB_USERNAME:college_app}
    password: ${DB_PASSWORD:college_app_password}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration

security:
  jwt:
    secret: ${JWT_SECRET:change-this-secret-to-at-least-64-characters-before-production-use}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:120}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.ansht.college: INFO
